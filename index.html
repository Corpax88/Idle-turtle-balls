<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Idle Turtle Balls v0.41.0 Juicy Crits</title><link rel="stylesheet" href="style.css"></head><body><div id="game"><div class="top"><div class="row"><div class="money" id="money">Starting...</div><div class="small" id="pps">0/s</div></div><div class="row small"><div id="stats">Loading</div><div id="hp">HP</div></div></div><div id="area"><canvas id="c"></canvas><div id="toast"></div><button id="summonBoss" class="summonBoss">SUMMON BOSS<span class="small">ready when you are</span></button><div id="modalShade"></div><div class="test">v0.41.0 Juicy Crits</div><div id="prestigePanel" class="panel"><button id="closeShop" class="close">Close</button><h2>PP Shop</h2><div class="grid"><button id="psIncome" class="prestItem prestige"><b>&#x1F4B0; Income</b><span>Permanent +25% money per level</span><br><em id="psIncomeCost"></em></button><button id="psStartBall" class="prestItem prestige"><b>&#x26AA; Start Balls</b><span>Start each run with more balls</span><br><em id="psStartBallCost"></em></button><button id="psRare" class="prestItem prestige"><b>&#x2728; Rare Luck</b><span>More shiny/legendary</span><br><em id="psRareCost"></em></button><button id="psPrestige" class="prestItem prestige"><b>&#x1F52E; PP Boost</b><span>More PP per prestige</span><br><em id="psPrestigeCost"></em></button></div><h2>Hero weapon tree</h2><div id="weaponTree" class="weaponTree"></div><h2>Boss upgrades</h2><div class="small">Only applies to boss fights.</div><div class="grid"><button id="psBossHp" class="prestItem bossbtn"><b>&#x2665; Boss HP</b><span>More HP in boss fights</span><br><em id="psBossHpCost"></em></button><button id="psBossDmg" class="prestItem bossbtn"><b>&#x1F528; Boss Damage</b><span>Shots deal more damage to bosses</span><br><em id="psBossDmgCost"></em></button><button id="psBossBalls" class="prestItem bossbtn"><b>&#x26AA; Boss Shots</b><span>More shots per volley</span><br><em id="psBossBallsCost"></em></button><button id="psBossSpeed" class="prestItem bossbtn"><b>&#x26A1; Boss Speed</b><span>Faster boss shots and reload</span><br><em id="psBossSpeedCost"></em></button><button id="psBossLuck" class="prestItem bossbtn"><b>&#x2728; Boss Luck</b><span>More shiny/legendary in boss fights</span><br><em id="psBossLuckCost"></em></button></div></div><div id="devPanel" class="panel"><button id="closeDev" class="close">Close</button><h2>Developer menu</h2><div class="small">Test mode - does not delete your save unless you press reset save.</div><div class="grid devGrid"><button id="devSpawn" class="bossbtn">&#x1F479; Spawn boss</button><button id="devExit" class="shopbtn">&#x1F422; Back to turtle</button><button id="devGold" class="shopbtn">&#x1F4B0; +100K gold</button><button id="devPurple" class="bossbtn">&#x1F49C; +10 purple</button><button id="devPP" class="prestige">&#x1F48E; +10 PP</button><button id="devX100" class="shopbtn">&#x1F422; Next boss</button><button id="devLegend" class="bossbtn">&#x1F31F; Legendary ball</button><button id="devHitboxes" class="shopbtn">Hitboxes OFF</button><button id="devResetSave" class="danger wide">Delete save / hard reset</button></div></div><div id="scorePanel" class="panel"><button id="closeScores" class="close">Close</button><h2>Highscore</h2><div id="scoreList" class="scoreList"></div><div class="grid devGrid"><button id="saveScore" class="shopbtn">Save score</button><button id="clearScores" class="danger">Clear list</button></div></div></div><div class="shop"><button id="buyBall">+ Ball<br><span class="small" id="ballCost"></span></button><button id="buyPower">+ Damage<br><span class="small" id="powerCost"></span></button><button id="buySpeed">+ Speed<br><span class="small" id="speedCost"></span></button><button id="buyLuck">+ Crit<br><span class="small" id="luckCost"></span></button><button id="mergeBalls" class="shopbtn wide">Merge</button><button id="doPrestige" class="prestige">Prestige<br><span class="small" id="prestigeGainText"></span></button><button id="openShop" class="prestige">PP Shop<br><span class="small" id="shopHint"></span></button><button id="buyPurple" class="bossbtn">+ &#x1F49C;<br><span class="small" id="purpleCost"></span></button><button id="openScores" class="shopbtn">Highscore<br><span class="small" id="scoreHint"></span></button><button id="openDev" class="bossbtn wide">&#x2699;&#xFE0F; Dev</button></div></div><script src="script.js"></script></body></html>
